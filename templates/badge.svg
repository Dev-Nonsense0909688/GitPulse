<svg width="100%" viewBox="0 0 480 130" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <clipPath id="avatarClip">
      <circle cx="55" cy="55" r="20"/>
    </clipPath>
  </defs>

  <!-- Card -->
  <rect x="10" y="10" width="460" height="110" rx="6"
      fill="#0b1220"
      stroke="#ffffff"
      stroke-width="1"/>
  <rect x="9" y="9" width="6" height="112" rx="2" fill="#6c63ff"/>
  <rect x="10" y="10" width="460" height="110" rx="6" fill="#0b1220"/>
  <rect x="9.81" y="9" width="5" height="112" fill="#6c63ff"/>

  <!-- Avatar -->
  <circle cx="55" cy="55" r="20" fill="#161b22"/>
  <image 
    href="{{avatar_url}}"
    x="35"
    y="35"
    width="40"
    height="40"
    clip-path="url(#avatarClip)"
    preserveAspectRatio="xMidYMid slice"
  />
  <circle cx="55" cy="55" r="20" fill="none" stroke="#6c63ff" stroke-width="1.2"/>

  <!-- Name -->
  <text x="85" y="45" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e6edf3">{{username}}</text>
  <text x="85" y="60" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">{{handle}}</text>

  <!-- Status -->
  <text x="85" y="75" font-size="9" fill="#1dc49a">{{extra}}</text>

  <!-- Grade -->
  <rect x="400" y="21" width="60" height="60" rx="6" 
      fill="none" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="430" y="47" font-size="20" font-weight="700" fill="#6c63ff" text-anchor="middle">{{grade}}</text>
  <text x="430" y="67" font-size="7" fill="#8b949e" text-anchor="middle">DEV SCORE</text>

  <!-- Divider -->
  <line x1="20" y1="85" x2="460" y2="85" stroke="#21262d"/>

  <!-- Stats (compressed af) -->
  <text x="50" y="100" font-size="11" font-weight="600" fill="#e6edf3">{{stars}}</text>
  <text x="50" y="110" font-size="8" fill="#8b949e">STARS</text>

  <text x="120" y="100" font-size="11" font-weight="600" fill="#e6edf3">{{repos}}</text>
  <text x="120" y="110" font-size="8" fill="#8b949e">REPOS</text>

  <text x="200" y="100" font-size="11" font-weight="600" fill="#e6edf3">{{commits}}</text>
  <text x="200" y="110" font-size="8" fill="#8b949e">COMMITS</text>
  <text x="240" y="109" font-size="6" font-weight="600" fill="#c4c5c2">[2026]</text>
  
  <text x="290" y="100" font-size="11" font-weight="600" fill="#3fb950">{{streak}}d</text>
  <text x="290" y="110" font-size="8" fill="#8b949e">STREAK</text>

  <text x="370" y="100" font-size="11" font-weight="600" fill="#e6edf3">{{prs}}</text>
  <text x="370" y="110" font-size="8" fill="#8b949e">PRS</text>
</svg>
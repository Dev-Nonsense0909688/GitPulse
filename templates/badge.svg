<svg width="100%" viewBox="0 0 720 220" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- stronger bg -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111114"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>

    <!-- accent -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c7cff"/>
      <stop offset="100%" stop-color="#5a54ff"/>
    </linearGradient>

    <!-- glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

    <clipPath id="avatarClip">
      <circle cx="70" cy="70" r="32"/>
    </clipPath>
  </defs>

  <!-- base -->
  <rect width="720" height="220" rx="18" fill="url(#bg)" />

  <!-- accent bar -->
  <rect x="0" y="0" width="4" height="220" fill="url(#accent)" filter="url(#glow)"/>

  <!-- avatar -->
  <image href="{{avatar_url}}" x="38" y="38" width="64" height="64" clip-path="url(#avatarClip)"/>
  <circle cx="70" cy="70" r="32" fill="none" stroke="url(#accent)" stroke-width="2"/>

  <!-- name -->
  <text x="120" y="58" font-size="22" fill="#ffffff" font-weight="600">{{username}}</text>
  <text x="120" y="80" font-size="13" fill="#777">@{{handle}}</text>

  <!-- status -->
  <circle cx="95" cy="90" r="5" fill="#22c55e"/>
  <text x="120" y="102" font-size="12" fill="#22c55e">{{extra}}</text>

  <!-- followers -->
  <rect x="560" y="28" width="140" height="30" rx="15" fill="#1c1c24"/>
  <text x="575" y="48" font-size="12" fill="#9fa0ff">● {{followers}} followers</text>

  <!-- divider -->
  <line x1="30" y1="120" x2="690" y2="120" stroke="#ffffff10"/>

  <!-- stats -->
  <!-- cleaner text (no emoji spam) -->
  <text x="80" y="145" font-size="11" fill="#666">Stars</text>
  <text x="80" y="172" font-size="22" fill="#fff">{{stars}}</text>

  <text x="200" y="145" font-size="11" fill="#666">Repos</text>
  <text x="200" y="172" font-size="22" fill="#fff">{{repos}}</text>

  <text x="320" y="145" font-size="11" fill="#666">Commits</text>
  <text x="320" y="172" font-size="22" fill="#fff">{{commits}}</text>

  <text x="440" y="145" font-size="11" fill="#666">Streak</text>
  <text x="440" y="172" font-size="22" fill="#22c55e">{{streak}}d</text>

  <text x="540" y="145" font-size="11" fill="#666">PRs</text>
  <text x="540" y="172" font-size="22" fill="#fff">{{prs}}</text>

  <!-- grade ring -->
  <circle cx="650" cy="160" r="40" fill="#0f0f14"/>
  <circle cx="650" cy="160" r="40" fill="none" stroke="#6C63FF33" stroke-width="4"/>

  <!-- clean ring -->
  <circle cx="650" cy="160" r="40" fill="none"
          stroke="url(#accent)" stroke-width="4"
          stroke-dasharray="180"
          stroke-dashoffset="60"
          stroke-linecap="round"/>

  <!-- grade -->
  <text x="650" y="155" font-size="28" fill="#8b85ff" text-anchor="middle" font-weight="600">{{grade}}</text>
  <text x="650" y="178" font-size="11" fill="#666" text-anchor="middle">Dev Score</text>

</svg>